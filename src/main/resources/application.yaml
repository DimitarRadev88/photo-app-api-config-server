spring:
  application:
    name: PhotoAppAPIConfigServer

  security:
    user:
      name: admin
      password: '{cipher}'
      roles: ADMIN

  cloud:
    config:
      server:
        native:
          search-locations: /home/dimitar-radev/IdeaProjects/PhotoApiLocalConfigFiles

        git:
          uri: https://github.com/DimitarRadev88/photo-app-configuration-repo
          default-label: master
          username: ${github.user}
          password: ${github.password}

  profiles:
    active: native

  rabbitmq:
    username: user
    password: password

management:
  endpoints:
    web:
      exposure:
        include: refresh, busrefresh

server:
  port: 8888

custom:
  security:
    user:
      name: client
      password: '{cipher}'
      roles: CLIENT

